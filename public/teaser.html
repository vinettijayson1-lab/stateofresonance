<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>From Thought To Form</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', serif;
            color: white;
        }

        /* The Mist */
        .mist {
            position: absolute;
            width: 200vw;
            height: 200vh;
            background: radial-gradient(circle at center, rgba(212, 175, 55, 0.15) 0%, rgba(0,0,0,0) 60%);
            opacity: 0;
            filter: blur(40px);
            animation: mist-coalesce 20s ease-in-out forwards;
        }

        @keyframes mist-coalesce {
            0% { opacity: 0; transform: scale(1.5); }
            30% { opacity: 1; transform: scale(1); }
            70% { opacity: 1; transform: scale(0.5); filter: blur(20px); }
            100% { opacity: 0; transform: scale(0.2); filter: blur(5px); }
        }

        /* Image Slides */
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            z-index: 5;
            padding: 2rem;
            box-sizing: border-box;
        }

        .img-1 { animation: slide-fade 5s ease-in-out 0s forwards; }
        .img-3 { animation: slide-fade 5s ease-in-out 5s forwards; }
        .img-2 { animation: slide-fade 5s ease-in-out 10s forwards; }

        @keyframes slide-fade {
            0% { opacity: 0; transform: scale(1.05); filter: blur(10px); }
            20% { opacity: 1; transform: scale(1); filter: blur(0px); }
            80% { opacity: 1; transform: scale(0.98); filter: blur(0px); }
            100% { opacity: 0; transform: scale(0.95); filter: blur(10px); }
        }

        /* The Triangle SVG */
        .triangle-container {
            position: relative;
            width: 400px;
            height: 400px;
            z-index: 10;
        }

        .triangle-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .triangle-path {
            fill: none;
            stroke: #d4af37;
            stroke-width: 2;
            stroke-dasharray: 1200;
            stroke-dashoffset: 1200;
            animation: draw-triangle 3s ease-in-out 15s forwards, glow-triangle 2s ease-in-out 18s forwards;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0));
        }

        @keyframes draw-triangle {
            to { stroke-dashoffset: 0; }
        }

        @keyframes glow-triangle {
            to { filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.8)); fill: rgba(212, 175, 55, 0.05); }
        }

        /* The Amulet Text */
        .amulet-text {
            position: absolute;
            top: 50px;
            left: 0;
            width: 100%;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            letter-spacing: 0.4em;
            color: #d4af37;
            font-size: 14px;
            line-height: 1.8;
            opacity: 0;
            animation: fade-in-text 3s ease-in-out 17s forwards;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        @keyframes fade-in-text {
            0% { opacity: 0; transform: translateY(-10px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Subtitle Text (Narration) */
        .subtitle {
            position: absolute;
            bottom: 10%;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0;
            z-index: 20;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9), 0 0 20px rgba(212,175,55,0.3);
        }

        .sub-1 { animation: sub-fade 5s ease-in-out 0s forwards; }
        .sub-2 { animation: sub-fade 5s ease-in-out 5s forwards; }
        .sub-3 { animation: sub-fade 5s ease-in-out 10s forwards; }
        .sub-4 { animation: sub-fade-stay 5s ease-in-out 15s forwards; }

        @keyframes sub-fade {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        @keyframes sub-fade-stay {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            100% { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="mist"></div>

    <!-- Images -->
    <img src="img1.jpg" class="slide img-1" alt="Idea">
    <img src="img3.jpg" class="slide img-3" alt="Frequency">
    <img src="img2.png" class="slide img-2" alt="Shape">

    <div class="triangle-container">
        <svg class="triangle-svg" viewBox="0 0 400 400">
            <!-- Inverted Triangle -->
            <polygon class="triangle-path" points="20,20 380,20 200,380" />
        </svg>
        
        <div class="amulet-text">
            BEVIBRATIONBELOVE<br>
            EVIBRATIONBELOV<br>
            VIBRATIONBELO<br>
            IBRATIONBEL<br>
            BRATIONBE<br>
            RATIONB<br>
            ATION<br>
            TIO<br>
            I
        </div>
    </div>

    <!-- Narration Subtitles -->
    <div class="subtitle sub-1">Every idea is a vibration.</div>
    <div class="subtitle sub-2">A frequency cast into the ether.</div>
    <div class="subtitle sub-3">The invisible takes shape.</div>
    <div class="subtitle sub-4">From thought to form.</div>

</body>
</html>
