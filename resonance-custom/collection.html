<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection | State of Resonance</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  </head>
  <body style="opacity: 0; transition: opacity 0.5s ease-in;">
    <div id="app">
      <div class="custom-cursor"></div>
      
      <!-- Premium Navbar -->
      <nav class="glass" style="position: fixed; top: 0; width: 100%; z-index: 1000; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;">
        <div class="logo" style="font-family: var(--font-heading); font-size: 1.5rem; letter-spacing: 0.1em;">
            <a href="/" style="color: inherit; text-decoration: none;">RESONANCE</a>
        </div>
        <div class="nav-links" style="display: flex; gap: 40px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.2em;">
          <a href="/sanctuary.html" style="color: var(--color-gold-muted); text-decoration: none;">The Sanctuary</a>
          <a href="/attire.html" style="color: inherit; text-decoration: none;">Attire</a>
          <a href="/collection.html?collection=manuscripts" style="color: inherit; text-decoration: none;">Manuscripts</a>
          <a href="/collection.html?collection=alchemy" style="color: inherit; text-decoration: none;">Alchemy</a>
          <a href="/blog.html" style="color: inherit; text-decoration: none;">Transmissions</a>
        </div>
        <div class="nav-actions" style="display: flex; gap: 20px;">
          <a href="https://stateofresonance.ca/cart" target="_blank" style="color: inherit; text-decoration: none; border-bottom: 1px solid var(--color-gold-muted);">Cart</a>
        </div>
      </nav>

      <main style="padding-top: 120px; min-height: 100vh;">
        <section class="container" style="max-width: 1200px; margin: 0 auto; padding: 40px 20px;">
            <header style="text-align: center; margin-bottom: 60px;">
                <h1 id="collection-title" style="font-family: var(--font-heading); font-size: 3rem; margin-bottom: 20px; font-weight: 400; text-transform: capitalize;">Collection</h1>
                <p id="collection-subtitle" style="color: #888; letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.9rem;">Curated Esoterica</p>
                <div style="width: 1px; height: 60px; background: var(--color-gold-muted); margin: 40px auto 0;"></div>
            </header>

            <div id="collection-grid" class="product-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px;">
                <!-- Product cards injected here via JS -->
            </div>
            
            <div id="no-products" style="display: none; text-align: center; padding: 100px 0; color: #555; letter-spacing: 0.2em; text-transform: uppercase;">
                No artifacts found in this frequency.
            </div>
        </section>
      </main>

      <footer class="glass" style="padding: 60px 40px; text-align: center; margin-top: 80px;">
        <div class="logo" style="font-family: var(--font-heading); font-size: 2rem; margin-bottom: 20px; letter-spacing: 0.2em;">STATE OF RESONANCE</div>
        <p style="color: #666; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase;">© 2026 Enter The Void</p>
      </footer>
    </div>
    
    <script type="module" src="/src/collection.ts"></script>
    <script>
      window.addEventListener('load', () => { document.body.style.opacity = '1'; });
    </script>
  </body>
</html>
