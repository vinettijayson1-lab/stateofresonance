<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter the Void | State of Resonance</title>
    <link rel="stylesheet" href="/src/style.css">
    <style>
        body {
            background: var(--color-onyx);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .void-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .choice-panel {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            border-right: 1px solid rgba(197, 160, 89, 0.1);
        }
        .choice-panel:last-child {
            border-right: none;
        }
        .choice-panel:hover {
            flex-grow: 1.5;
            background: rgba(197, 160, 89, 0.05);
        }
        .choice-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0.3;
            transition: transform 1.2s ease, opacity 0.8s ease;
            filter: grayscale(100%);
            z-index: 1;
        }
        .choice-panel:hover .choice-bg {
            opacity: 0.6;
            transform: scale(1.05);
            filter: grayscale(0%);
        }
        .choice-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }
        .choice-title {
            font-family: var(--font-heading);
            font-size: 5rem;
            letter-spacing: 0.2em;
            margin: 0;
            line-height: 1;
        }
        .choice-subtitle {
            font-family: var(--font-body);
            font-size: 0.9rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--color-gold-muted);
            margin-top: 20px;
        }
        .divider {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            height: 400px;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--color-gold-muted), transparent);
            z-index: 3;
        }
        @media (max-width: 768px) {
            .void-container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
            .divider {
                width: 300px;
                height: 1px;
                background: linear-gradient(to right, transparent, var(--color-gold-muted), transparent);
            }
            .choice-title {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="custom-cursor"></div>
    
    <div class="void-container">
        <div class="divider"></div>
        
        <a href="/attire.html" class="choice-panel shroud-panel">
            <div class="choice-bg" style="background-image: url('/assets/gb-sigil-hoodie.png');"></div>
            <div class="choice-content">
                <h2 class="choice-title">ATTIRE</h2>
                <span class="choice-subtitle">Shroud Yourself</span>
            </div>
        </a>

        <a href="/sanctuary.html" class="choice-panel tools-panel">
            <div class="choice-bg" style="background-image: url('/assets/skeleton-incense.png');"></div>
            <div class="choice-content">
                <h2 class="choice-title">TOOLS</h2>
                <span class="choice-subtitle">Manifest Reality</span>
            </div>
        </a>
    </div>

    <script src="/src/main.ts" type="module"></script>
</body>
</html>
